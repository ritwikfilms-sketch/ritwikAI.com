<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritwik AI | Success Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full bg-slate-900 border border-blue-500/20 rounded-[2.5rem] p-8 shadow-[0_0_50px_rgba(59,130,246,0.1)] relative overflow-hidden">
        
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                Ritwik AI Empire
            </h1>
            <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-green-500/10 border border-green-500/20 rounded-full">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-green-400 text-xs font-bold tracking-widest uppercase">70% Automation Live 🚀</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-white/5 border border-white/10 rounded-2xl">
                <i data-lucide="shield-check" class="text-blue-400 w-5 h-5 mb-2"></i>
                <p class="text-[10px] text-gray-400 uppercase tracking-wider">Safety Status</p>
                <h3 class="text-lg font-bold">IRONCLAD 🛡️</h3>
            </div>
            <div class="p-4 bg-white/5 border border-white/10 rounded-2xl">
                <i data-lucide="ban" class="text-red-400 w-5 h-5 mb-2"></i> <p class="text-[10px] text-gray-400 uppercase tracking-wider">Blocks (Daily)</p>
                <h3 class="text-lg font-bold">12 Active</h3>
            </div>
        </div>

        <div class="bg-gradient-to-br from-blue-600/10 to-purple-600/10 border border-white/10 rounded-3xl p-6 text-center mb-6">
            <p class="text-sm text-gray-300 mb-4 font-medium">मास्टर, आपकी रील अब साम्राज्य के साथ जुड़ चुकी है।</p>
            <a href="https://www.instagram.com/ritwikfilms-sketch/" target="_blank" 
               class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-pink-500 to-orange-500 hover:from-pink-600 hover:to-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02]">
                <i data-lucide="film" class="w-5 h-5"></i>
                Instagram Reel लिंक 🔗
            </a>
        </div>

        <div class="text-center">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">Voice Key Enabled • Ritwik AI Support Buddy v3.0</p>
        </div>
    </div>

    <script>
        // Icons को रेंडर करने के लिए
        lucide.createIcons();
    </script>
</body>
</html>
